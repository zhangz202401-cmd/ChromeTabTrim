  <text x="1230" y="198" font-size="11" fill="#d5a3a0" text-anchor="end">关闭</text>
  <line x1="940" y1="212" x2="1240" y2="212" stroke="#f0f4f4" stroke-width="1"/>

  <rect x="956" y="220" width="12" height="12" rx="3" fill="#764abc"/>
  <text x="976" y="230" font-size="12" font-weight="600" fill="#2d4a4a">Redux Docs</text>
  <rect x="1100" y="218" width="52" height="18" rx="9" fill="rgba(255,200,100,0.18)"/>
  <text x="1126" y="231" font-size="10" font-weight="700" fill="#b07d20" text-anchor="middle">76 MB</text>
  <text x="1230" y="230" font-size="11" fill="#d5a3a0" text-anchor="end">关闭</text>
  <line x1="940" y1="244" x2="1240" y2="244" stroke="#f0f4f4" stroke-width="1"/>

  <rect x="956" y="252" width="12" height="12" rx="3" fill="#24292e"/>
