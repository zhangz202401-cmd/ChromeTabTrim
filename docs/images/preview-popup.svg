<svg width="320" height="420" viewBox="0 0 320 420" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display','PingFang SC',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfffe"/>
      <stop offset="100%" stop-color="#f3fbfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#81d8d0" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
