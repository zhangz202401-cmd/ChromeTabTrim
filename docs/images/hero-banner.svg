<svg width="1280" height="480" viewBox="0 0 1280 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4fdfb"/>
      <stop offset="100%" stop-color="#e8f9f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="480" rx="28" fill="url(#bg)"/>

  <!-- Subtle decorative circles (behind content, no overlap) -->
  <circle cx="1180" cy="80" r="160" fill="rgba(129,216,208,0.10)"/>
  <circle cx="100" cy="420" r="120" fill="rgba(129,216,208,0.08)"/>

  <!-- ── LEFT SIDE: text block (x: 80–620) ── -->

  <!-- Badge -->
  <rect x="80" y="60" width="160" height="28" rx="14" fill="rgba(95,201,192,0.15)"/>
