  <circle cx="92" cy="346" r="5" fill="#5fc9c0"/>
  <text x="108" y="351" font-size="17" fill="#4a6868">关闭历史记录 · 一键恢复标签页</text>

  <circle cx="92" cy="384" r="5" fill="#5fc9c0"/>
