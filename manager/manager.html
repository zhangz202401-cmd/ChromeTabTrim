<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://www.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline'; script-src 'self';">
<title>TabTrim - 管理页面</title>
<link rel="stylesheet" href="manager.css">
</head>
<body>
<div class="app-shell">
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="topbar">
    <div class="brand">
      <span class="eyebrow">Workspace Console</span>
      <h1>TabTrim</h1>
      <p>按主站域名管理重复标签页，快速整理休眠页签与关闭历史。</p>
    </div>
    <nav class="nav">
      <button class="tab-btn active" data-tab="overview">概览</button>
      <button class="tab-btn" data-tab="sleep">休眠管理</button>
      <button class="tab-btn" data-tab="history">关闭历史</button>
      <button class="tab-btn" data-tab="settings">设置</button>
    </nav>
  </header>

  <main class="workspace">
    <section id="overview" class="tab-panel active">
      <div class="toolbar card">
        <div class="toolbar-copy">
          <span id="overviewCount" class="toolbar-title"></span>
          <span class="toolbar-note">支持按完整 URL 或主站域名展开重复标签页并按组处理</span>
        </div>
        <div class="toolbar-actions">
          <input id="overviewSearch" type="text" placeholder="搜索标签页 / 域名 / URL..." class="search">
          <button id="closeSelected" class="btn subtle-danger" disabled>关闭选中</button>
          <button id="closeDupsBtn" class="btn secondary">URL 去重</button>
          <button id="closeDomainDupsBtn" class="btn primary">主站域名去重</button>
        </div>
      </div>
      <div id="urlDupPanel" class="domain-dup-panel hidden"></div>
      <div id="domainDupPanel" class="domain-dup-panel hidden"></div>
      <ul id="tabList" class="item-list card"></ul>
    </section>

    <section id="sleep" class="tab-panel">
      <div class="toolbar card">
        <div class="toolbar-copy">
          <span id="sleepCount" class="toolbar-title"></span>
          <span class="toolbar-note">支持快速唤醒休眠中的标签页</span>
        </div>
        <div class="toolbar-actions">
          <input id="sleepSearch" type="text" placeholder="搜索休眠标签页..." class="search">
          <button id="wakeAll" class="btn primary">全部唤醒</button>
        </div>
      </div>
      <ul id="sleepList" class="item-list card"></ul>
    </section>

    <section id="history" class="tab-panel">
      <div class="toolbar card">
        <div class="toolbar-copy">
          <span class="toolbar-title">关闭历史</span>
          <span class="toolbar-note">支持快速搜索与恢复最近关闭的标签页</span>
        </div>
        <div class="toolbar-actions">
          <input id="historySearch" type="text" placeholder="搜索历史..." class="search">
          <button id="exportHistory" class="btn secondary">导出 JSON</button>
          <button id="clearHistory" class="btn subtle-danger">清空历史</button>
        </div>
      </div>
      <ul id="historyList" class="item-list card"></ul>
    </section>

    <section id="settings" class="tab-panel">
      <div class="settings-grid">
        <div class="settings-form card">
          <div class="settings-header">
            <h2>自动休眠</h2>
            <p>定义标签页空闲多久后自动进入休眠状态。</p>
          </div>
          <div class="field">
            <label>自动休眠阈值（分钟）</label>
            <input id="sleepThreshold" type="number" min="1" max="1440">
          </div>
          <div class="field checkbox-field">
            <label><input id="sleepEnabled" type="checkbox"> 启用自动休眠</label>
          </div>
        </div>

        <div class="settings-form card">
          <div class="settings-header">
            <h2>自动去重</h2>
            <p>定时扫描完全相同 URL 的重复标签页，自动保留优先级最高的一个并关闭其余标签页。</p>
          </div>
          <div class="field checkbox-field">
            <label><input id="autoDedupEnabled" type="checkbox"> 启用自动清除完全重复标签</label>
          </div>
          <div class="field">
            <label>自动去重间隔</label>
            <select id="autoDedupInterval">
              <option value="1">每 1 分钟</option>
              <option value="5">每 5 分钟</option>
              <option value="15">每 15 分钟</option>
              <option value="30">每 30 分钟</option>
              <option value="60">每 1 小时</option>
              <option value="180">每 3 小时</option>
              <option value="360">每 6 小时</option>
              <option value="720">每 12 小时</option>
              <option value="1440">每 1 天</option>
            </select>
          </div>
        </div>

      </div>
      <div class="settings-footer card">
        <div class="settings-actions">
          <button id="saveSettings" class="btn primary">保存设置</button>
          <span id="saveMsg" class="save-msg"></span>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="manager.js"></script>
</body>
</html>
