  <circle cx="24" cy="28" r="7" fill="#5fc9c0"/>
  <text x="38" y="33" font-size="14" font-weight="700" fill="#1a1a2e">TabTrim</text>
  <rect x="230" y="18" width="72" height="22" rx="11" fill="rgba(129,216,208,0.15)" stroke="#d0f0ed" stroke-width="1"/>
  <text x="266" y="33" font-size="11" font-weight="600" fill="#5fc9c0" text-anchor="middle">完整管理</text>

  <!-- Stats -->
  <rect x="12" y="64" width="296" height="80" rx="16" fill="white" opacity="0.9" filter="url(#shadow)"/>
  <!-- stat 1 -->
  <rect x="20" y="72" width="88" height="64" rx="12" fill="#f5f7fc"/>
  <text x="64" y="102" font-size="26" font-weight="800" fill="#1a1a2e" text-anchor="middle">47</text>
  <text x="64" y="120" font-size="11" fill="#999" text-anchor="middle">标签页</text>
  <!-- stat 2 -->
  <rect x="116" y="72" width="88" height="64" rx="12" fill="#fff5f5"/>
  <text x="160" y="102" font-size="26" font-weight="800" fill="#e53e3e" text-anchor="middle">8</text>
  <text x="160" y="120" font-size="11" fill="#999" text-anchor="middle">重复</text>
  <!-- stat 3 -->
  <rect x="212" y="72" width="88" height="64" rx="12" fill="#f0f6ff"/>
  <text x="256" y="102" font-size="26" font-weight="800" fill="#4A90E2" text-anchor="middle">12</text>
  <text x="256" y="120" font-size="11" fill="#999" text-anchor="middle">已休眠</text>

