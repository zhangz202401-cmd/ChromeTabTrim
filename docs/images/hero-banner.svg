  <rect x="1100" y="250" width="52" height="18" rx="9" fill="rgba(255,200,100,0.18)"/>
  <text x="1126" y="263" font-size="10" font-weight="700" fill="#b07d20" text-anchor="middle">88 MB</text>
  <text x="1230" y="262" font-size="11" fill="#d5a3a0" text-anchor="end">关闭</text>
  <line x1="940" y1="276" x2="1240" y2="276" stroke="#f0f4f4" stroke-width="1"/>

